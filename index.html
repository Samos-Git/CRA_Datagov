
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.cra{padding:1rem 0;}
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:1rem;flex-wrap:wrap;}
.top-bar input{padding:6px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);}
.top-bar input:focus{outline:none;border-color:#1D9E75;}
.collab-input{min-width:180px;flex:1;max-width:240px;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:10px;}
.header-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.title{font-size:18px;font-weight:500;color:var(--color-text-primary);}
.month-nav{display:flex;align-items:center;gap:6px;}
.month-nav button{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:4px 10px;cursor:pointer;color:var(--color-text-primary);font-size:13px;}
.month-nav button:hover{background:var(--color-background-secondary);}
.month-label{font-size:15px;font-weight:500;min-width:150px;text-align:center;color:var(--color-text-primary);}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn{padding:6px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);cursor:pointer;font-size:13px;background:transparent;color:var(--color-text-primary);display:flex;align-items:center;gap:6px;}
.btn:hover{background:var(--color-background-secondary);}
.btn-green{background:#0F6E56;border-color:#0F6E56;color:#fff;}
.btn-green:hover{background:#085041;border-color:#085041;}
.btn-blue{background:#185FA5;border-color:#185FA5;color:#fff;}
.btn-blue:hover{background:#0C447C;border-color:#0C447C;}
.add-row{display:flex;align-items:center;gap:8px;margin-bottom:1rem;}
.add-row input{padding:6px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);min-width:200px;flex:1;max-width:280px;}
.add-row input:focus{outline:none;border-color:#1D9E75;}
.table-wrap{overflow-x:auto;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px;}
thead th{background:var(--color-background-secondary);color:var(--color-text-secondary);font-weight:500;font-size:11px;padding:7px 3px;text-align:center;border-bottom:0.5px solid var(--color-border-tertiary);position:sticky;top:0;z-index:2;}
thead th:first-child{text-align:left;padding-left:10px;min-width:150px;position:sticky;left:0;z-index:3;background:var(--color-background-secondary);}
.dh{display:flex;flex-direction:column;align-items:center;gap:1px;}
.dn{font-size:9px;color:var(--color-text-tertiary);}
.dd{font-size:12px;font-weight:500;}
.we-hd{opacity:.45;}
tbody tr{border-bottom:0.5px solid var(--color-border-tertiary);}
tbody tr:last-child{border-bottom:none;}
td:first-child{padding:5px 6px 5px 10px;font-size:13px;color:var(--color-text-primary);font-weight:500;position:sticky;left:0;background:var(--color-background-primary);z-index:1;border-right:0.5px solid var(--color-border-tertiary);}
.lbl-conge{color:#0F6E56;}
.lbl-rtt{color:#185FA5;}
.lbl-flex{display:flex;align-items:center;justify-content:space-between;}
.del-btn{background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:14px;padding:0 2px;opacity:0;transition:opacity .15s;}
tbody tr:hover .del-btn{opacity:1;}
.del-btn:hover{color:#E24B4A;}
td.dc{padding:3px 2px;text-align:center;vertical-align:middle;}
td.dc.we{background:var(--color-background-tertiary);}
select.cs{width:46px;padding:2px 1px;border:0.5px solid transparent;border-radius:4px;text-align:center;font-size:12px;cursor:pointer;appearance:none;background:transparent;color:var(--color-text-primary);transition:border-color .12s,background .12s;}
select.cs:hover,select.cs:focus{border-color:var(--color-border-secondary);background:var(--color-background-secondary);outline:none;}
select.cs.v1{background:#e1f5ee;color:#0F6E56;border-color:#9FE1CB;}
select.cs.vh{background:#e6f1fb;color:#185FA5;border-color:#B5D4F4;}
select.cs.vc{background:#e1f5ee;color:#0F6E56;border-color:#9FE1CB;}
select.cs.vr{background:#faeeda;color:#854F0B;border-color:#FAC775;}
.sep-row td{height:2px;background:var(--color-border-tertiary);padding:0;}
.sep-row td:first-child{background:var(--color-border-tertiary);}
.tot-row td{background:var(--color-background-secondary);font-weight:500;font-size:11px;}
.tot-row td:first-child{color:var(--color-text-secondary);font-size:11px;}
td.tc{color:var(--color-text-primary);font-size:12px;font-weight:500;}
td.tc.over{color:#E24B4A;}td.tc.ok{color:#0F6E56;}td.tc.blu{color:#185FA5;}td.tc.amb{color:#854F0B;}
.summary{display:flex;gap:10px;margin-top:1rem;flex-wrap:wrap;}
.sc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;flex:1;min-width:110px;}
.sc .sl{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;}
.sc .sv{font-size:20px;font-weight:500;color:var(--color-text-primary);}
.sv.green{color:#0F6E56;}.sv.blue{color:#185FA5;}.sv.amber{color:#854F0B;}.sv.red{color:#E24B4A;}
.toast{position:absolute;top:-40px;left:50%;transform:translateX(-50%);background:#0F6E56;color:#fff;padding:6px 14px;border-radius:var(--border-radius-md);font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.import-wrap{position:relative;}
</style>

<h2 class="sr-only">Application CRA — Gestion des activités et congés</h2>

<div class="cra" style="position:relative;">
  <div class="top-bar">
    <i class="ti ti-user" aria-hidden="true" style="font-size:16px;color:var(--color-text-secondary);"></i>
    <input class="collab-input" type="text" id="collabName" placeholder="Nom du collaborateur..." oninput="updateTitle()" />
    <div style="height:24px;width:0.5px;background:var(--color-border-tertiary);"></div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="monthLabel"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <div class="header">
    <div class="header-left">
      <div class="add-row" style="margin-bottom:0;">
        <input type="text" id="newAct" placeholder="Nom du projet / activité..." onkeydown="if(event.key==='Enter')addActivity()" />
        <button class="btn" onclick="addActivity()"><i class="ti ti-plus" aria-hidden="true"></i> Ajouter</button>
      </div>
    </div>
    <div class="header-right">
      <div class="import-wrap">
        <button class="btn btn-blue" onclick="document.getElementById('fileInput').click()"><i class="ti ti-upload" aria-hidden="true"></i> Importer Excel</button>
        <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none;" onchange="importExcel(event)" />
      </div>
      <button class="btn btn-green" onclick="exportExcel()"><i class="ti ti-download" aria-hidden="true"></i> Exporter Excel</button>
    </div>
  </div>

  <div id="toastMsg" class="toast"></div>

  <div class="table-wrap">
    <table id="craTable">
      <thead id="tHead"></thead>
      <tbody id="tBody"></tbody>
    </table>
  </div>
  <div class="summary" id="summary"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS=['dim','lun','mar','mer','jeu','ven','sam'];
let year=new Date().getFullYear(), month=new Date().getMonth();
let activities=['Projet Alpha','Projet Beta','Interne / Admin'];
let data={};

function k(row,col){return `${year}-${month}-${row}-${col}`;}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function isWE(y,m,d){const w=new Date(y,m,d).getDay();return w===0||w===6;}
function get(row,col){return data[k(row,col)]||'';}
function set(row,col,val){const key=k(row,col);if(val==='')delete data[key];else data[key]=val;updateSummary();}

function cls(v,we){if(we)return '';if(v==='1')return 'v1';if(v==='0.5')return 'vh';return '';}
function clsConge(v,we){if(we)return '';if(v==='1'||v==='0.5')return 'vc';return '';}
function clsRtt(v,we){if(we)return '';if(v==='1'||v==='0.5')return 'vr';return '';}

function showToast(msg,color='#0F6E56'){
  const t=document.getElementById('toastMsg');
  t.textContent=msg;t.style.background=color;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function updateTitle(){
  document.getElementById('monthLabel').textContent=`${MONTHS[month]} ${year}`;
}

function changeMonth(d){
  month+=d;if(month>11){month=0;year++;}if(month<0){month=11;year--;}
  render();
}

function addActivity(){
  const i=document.getElementById('newAct');const v=i.value.trim();
  if(!v)return;if(!activities.includes(v))activities.push(v);
  render();i.value='';
}

function removeActivity(i){activities.splice(i,1);render();}

function selOpts(v,we,type){
  if(we)return `<option value="">—</option>`;
  let o=`<option value="">—</option><option value="1"${v==='1'?' selected':''}>1</option><option value="0.5"${v==='0.5'?' selected':''}>0.5</option>`;
  return o;
}

function render(){
  const days=daysInMonth(year,month);
  document.getElementById('monthLabel').textContent=`${MONTHS[month]} ${year}`;

  let h=`<tr><th>Activité / Jour</th>`;
  for(let d=1;d<=days;d++){
    const we=isWE(year,month,d);
    const dow=DAYS[new Date(year,month,d).getDay()];
    h+=`<th class="${we?'we-hd':''}"><div class="dh"><span class="dn">${dow}</span><span class="dd">${d}</span></div></th>`;
  }
  h+=`<th style="min-width:46px;padding:0 6px;">Total</th></tr>`;
  document.getElementById('tHead').innerHTML=h;

  let b='';
  activities.forEach((act,i)=>{
    b+=`<tr><td><div class="lbl-flex"><span>${act}</span><button class="del-btn" onclick="removeActivity(${i})" title="Supprimer"><i class="ti ti-x"></i></button></div></td>`;
    let tot=0;
    for(let d=1;d<=days;d++){
      const we=isWE(year,month,d);const v=get(i,d);
      if(v==='1')tot+=1;else if(v==='0.5')tot+=0.5;
      const c=cls(v,we);
      b+=`<td class="dc${we?' we':''}"><select class="cs ${c}" ${we?'disabled':''} onchange="set(${i},${d},this.value);this.className='cs '+getCls(this.value,${we},'act')">${selOpts(v,we,'act')}</select></td>`;
    }
    b+=`<td class="tc">${tot>0?tot:''}</td></tr>`;
  });

  b+=`<tr class="sep-row"><td colspan="${days+2}"></td></tr>`;

  ['conge','rtt'].forEach(type=>{
    const label=type==='conge'?'<i class="ti ti-beach" aria-hidden="true" style="font-size:13px;margin-right:5px;vertical-align:-2px;"></i>Congés payés':'<i class="ti ti-sun" aria-hidden="true" style="font-size:13px;margin-right:5px;vertical-align:-2px;"></i>RTT';
    b+=`<tr><td class="lbl-${type==='conge'?'conge':'rtt'}">${label}</td>`;
    let tot=0;
    for(let d=1;d<=days;d++){
      const we=isWE(year,month,d);const v=get(type,d);
      if(v==='1')tot+=1;else if(v==='0.5')tot+=0.5;
      const c=type==='conge'?clsConge(v,we):clsRtt(v,we);
      b+=`<td class="dc${we?' we':''}"><select class="cs ${c}" ${we?'disabled':''} onchange="set('${type}',${d},this.value);this.className='cs '+getCls(this.value,${we},'${type}')">${selOpts(v,we,type)}</select></td>`;
    }
    const tc=type==='conge'?'ok':'blu';
    b+=`<td class="tc ${tot>0?tc:''}">${tot>0?tot:''}</td></tr>`;
  });

  b+=`<tr class="tot-row"><td>Total / jour</td>`;
  let grand=0;
  for(let d=1;d<=days;d++){
    const we=isWE(year,month,d);
    let s=0;
    activities.forEach((_,i)=>{const v=get(i,d);if(v==='1')s+=1;else if(v==='0.5')s+=0.5;});
    ['conge','rtt'].forEach(r=>{const v=get(r,d);if(v==='1')s+=1;else if(v==='0.5')s+=0.5;});
    grand+=s;
    const c=s>1?'over':s===1?'ok':'';
    b+=`<td class="dc tc ${c}">${we?'':s>0?s:''}</td>`;
  }
  b+=`<td class="tc">${grand>0?grand:''}</td></tr>`;
  document.getElementById('tBody').innerHTML=b;
  updateSummary();
}

function getCls(v,we,type){
  if(we)return '';
  if(type==='act')return cls(v,we);
  if(type==='conge')return clsConge(v,we);
  if(type==='rtt')return clsRtt(v,we);
  return '';
}

function updateSummary(){
  const days=daysInMonth(year,month);
  let worked=0,conge=0,rtt=0,ouvres=0;
  for(let d=1;d<=days;d++){
    if(!isWE(year,month,d))ouvres++;
    const c=get('conge',d);if(c==='1')conge+=1;else if(c==='0.5')conge+=0.5;
    const r=get('rtt',d);if(r==='1')rtt+=1;else if(r==='0.5')rtt+=0.5;
    let s=0;activities.forEach((_,i)=>{const v=get(i,d);if(v==='1')s+=1;else if(v==='0.5')s+=0.5;});
    worked+=s;
  }
  const total=worked+conge+rtt;
  const diff=total-ouvres;
  const dc=diff>0.05?'red':diff<-0.05?'amber':'green';
  const name=document.getElementById('collabName').value.trim();
  document.getElementById('summary').innerHTML=`
    <div class="sc"><div class="sl">${name?name:'Collaborateur'}</div><div class="sv" style="font-size:14px;color:var(--color-text-secondary);">${MONTHS[month]} ${year}</div></div>
    <div class="sc"><div class="sl">Jours ouvrés</div><div class="sv">${ouvres}</div></div>
    <div class="sc"><div class="sl">Jours travaillés</div><div class="sv green">${worked}</div></div>
    <div class="sc"><div class="sl">Congés</div><div class="sv green">${conge}</div></div>
    <div class="sc"><div class="sl">RTT</div><div class="sv blue">${rtt}</div></div>
    <div class="sc"><div class="sl">Total imputé</div><div class="sv ${dc}">${total} / ${ouvres}</div></div>
  `;
}

function exportExcel(){
  const days=daysInMonth(year,month);
  const name=document.getElementById('collabName').value.trim()||'Collaborateur';
  const wb=XLSX.utils.book_new();
  const rows=[];

  rows.push([`CRA — ${name} — ${MONTHS[month]} ${year}`]);
  rows.push([]);

  const hRow=['Activité / Jour'];
  for(let d=1;d<=days;d++) hRow.push(isWE(year,month,d)?`(${d})`:`${d}`);
  hRow.push('Total');
  rows.push(hRow);

  activities.forEach((act,i)=>{
    const row=[act];let tot=0;
    for(let d=1;d<=days;d++){const v=get(i,d);const n=v==='1'?1:v==='0.5'?0.5:null;if(n)tot+=n;row.push(n!==null?n:'');}
    row.push(tot||'');rows.push(row);
  });

  rows.push([]);

  ['conge','rtt'].forEach(type=>{
    const row=[type==='conge'?'Congés payés':'RTT'];let tot=0;
    for(let d=1;d<=days;d++){const v=get(type,d);const n=v==='1'?1:v==='0.5'?0.5:null;if(n)tot+=n;row.push(n!==null?n:'');}
    row.push(tot||'');rows.push(row);
  });

  const totRow=['Total / jour'];let grand=0;
  for(let d=1;d<=days;d++){
    if(isWE(year,month,d)){totRow.push('');continue;}
    let s=0;
    activities.forEach((_,i)=>{const v=get(i,d);if(v==='1')s+=1;else if(v==='0.5')s+=0.5;});
    ['conge','rtt'].forEach(r=>{const v=get(r,d);if(v==='1')s+=1;else if(v==='0.5')s+=0.5;});
    grand+=s;totRow.push(s||'');
  }
  totRow.push(grand||'');rows.push(totRow);

  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:24},...Array(days).fill({wch:5}),{wch:7}];
  XLSX.utils.book_append_sheet(wb,ws,`${MONTHS[month]} ${year}`);
  XLSX.writeFile(wb,`CRA_${name.replace(/\s+/g,'_')}_${MONTHS[month]}_${year}.xlsx`);
  showToast('Export réussi !');
}

function importExcel(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(!rows||rows.length<3){showToast('Fichier non reconnu','#E24B4A');return;}

      const titleRow=(rows[0][0]||'').toString();
      const namMatch=titleRow.match(/CRA\s*—\s*(.+?)\s*—/);
      const monMatch=titleRow.match(/—\s*([^\s—]+)\s+(\d{4})$/);
      if(namMatch)document.getElementById('collabName').value=namMatch[1].trim();
      if(monMatch){
        const mi=MONTHS.indexOf(monMatch[1].trim());
        if(mi>=0)month=mi;
        year=parseInt(monMatch[2])||year;
      }

      data={};activities=[];
      let headerRowIdx=-1;
      for(let r=0;r<rows.length;r++){
        if(rows[r][0]==='Activité / Jour'){headerRowIdx=r;break;}
      }
      if(headerRowIdx<0){showToast('Fichier non reconnu','#E24B4A');return;}

      const days=daysInMonth(year,month);
      const colMap={};
      const hRow=rows[headerRowIdx];
      for(let c=1;c<hRow.length-1;c++){
        const v=(hRow[c]||'').toString().replace(/[()]/g,'');
        const d=parseInt(v);
        if(d>=1&&d<=days)colMap[c]=d;
      }

      for(let r=headerRowIdx+1;r<rows.length;r++){
        const row=rows[r];
        const label=(row[0]||'').toString().trim();
        if(!label)continue;
        let rowKey=null;
        if(label==='Congés payés')rowKey='conge';
        else if(label==='RTT')rowKey='rtt';
        else if(label==='Total / jour')break;
        else{activities.push(label);rowKey=activities.length-1;}
        for(let c=1;c<row.length-1;c++){
          const d=colMap[c];if(!d)continue;
          const v=row[c];
          if(v===1||v==='1')set(rowKey,d,'1');
          else if(v===0.5||v==='0.5')set(rowKey,d,'0.5');
        }
      }

      render();
      showToast(`Fichier importé avec succès !`);
    }catch(err){showToast('Erreur lors de l\'import','#E24B4A');}
    evt.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

render();
</script>
