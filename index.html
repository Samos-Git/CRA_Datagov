
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.cra{padding:1rem 0;}
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap;}
.top-bar input{padding:6px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);}
.top-bar input:focus{outline:none;border-color:#1D9E75;}
.collab-input{min-width:180px;flex:1;max-width:260px;}
.divider{height:22px;width:0.5px;background:var(--color-border-tertiary);}
.month-nav{display:flex;align-items:center;gap:6px;}
.month-nav button{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:4px 10px;cursor:pointer;color:var(--color-text-primary);font-size:13px;}
.month-nav button:hover{background:var(--color-background-secondary);}
.month-label{font-size:14px;font-weight:500;min-width:140px;text-align:center;color:var(--color-text-primary);}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.toolbar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.toolbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn{padding:6px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);cursor:pointer;font-size:13px;background:transparent;color:var(--color-text-primary);display:inline-flex;align-items:center;gap:5px;}
.btn:hover{background:var(--color-background-secondary);}
.btn-green{background:#0F6E56;border-color:#0F6E56;color:#fff;}
.btn-green:hover{background:#085041;}
.btn-blue{background:#185FA5;border-color:#185FA5;color:#fff;}
.btn-blue:hover{background:#0C447C;}
.act-input{padding:6px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);width:220px;}
.act-input:focus{outline:none;border-color:#1D9E75;}
.table-wrap{overflow-x:auto;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px;}
thead th{background:var(--color-background-secondary);color:var(--color-text-secondary);font-weight:500;font-size:11px;padding:7px 3px;text-align:center;border-bottom:0.5px solid var(--color-border-tertiary);position:sticky;top:0;z-index:2;}
thead th.act-col{text-align:left;padding-left:8px;min-width:170px;position:sticky;left:0;z-index:3;background:var(--color-background-secondary);}
.dh{display:flex;flex-direction:column;align-items:center;gap:1px;}
.dn{font-size:9px;color:var(--color-text-tertiary);}
.dd{font-size:11px;font-weight:500;}
.we-th{opacity:.4;}
tbody tr{border-bottom:0.5px solid var(--color-border-tertiary);}
tbody tr:last-child{border-bottom:none;}
td.act-col{padding:5px 6px 5px 8px;font-size:12px;color:var(--color-text-primary);font-weight:500;position:sticky;left:0;background:var(--color-background-primary);z-index:1;border-right:0.5px solid var(--color-border-tertiary);min-width:170px;}
.lbl-row{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.lbl-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.del-btn{background:#FCEBEB;border:0.5px solid #F7C1C1;border-radius:4px;cursor:pointer;color:#A32D2D;font-size:11px;padding:2px 5px;display:inline-flex;align-items:center;flex-shrink:0;line-height:1;}
.del-btn:hover{background:#F7C1C1;}
.lbl-conge{color:#085041;}
.lbl-rtt{color:#0C447C;}
td.dc{padding:2px 2px;text-align:center;vertical-align:middle;}
td.dc.we{background:var(--color-background-tertiary);}
select.cs{width:44px;padding:2px 0;border:0.5px solid transparent;border-radius:4px;text-align:center;font-size:11px;cursor:pointer;appearance:none;background:transparent;color:var(--color-text-primary);}
select.cs:hover,select.cs:focus{border-color:var(--color-border-secondary);background:var(--color-background-secondary);outline:none;}
select.cs.v1{background:#e1f5ee;color:#085041;border-color:#9FE1CB;}
select.cs.vh{background:#e6f1fb;color:#0C447C;border-color:#B5D4F4;}
select.cs.vc{background:#e1f5ee;color:#085041;border-color:#9FE1CB;}
select.cs.vr{background:#faeeda;color:#633806;border-color:#FAC775;}
.sep-row td{height:2px;background:var(--color-border-tertiary);padding:0;}
.sep-row td.act-col{background:var(--color-border-tertiary);}
.tot-row td{background:var(--color-background-secondary);font-size:11px;font-weight:500;color:var(--color-text-secondary);}
.tot-row td.act-col{color:var(--color-text-secondary);}
td.tc{font-size:11px;font-weight:500;color:var(--color-text-primary);}
td.tc.over{color:#A32D2D;}td.tc.ok{color:#085041;}td.tc.blu{color:#0C447C;}td.tc.amb{color:#633806;}
.summary{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;}
.sc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;flex:1;min-width:100px;}
.sc .sl{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;}
.sc .sv{font-size:18px;font-weight:500;color:var(--color-text-primary);}
.sv.green{color:#085041;}.sv.blue{color:#0C447C;}.sv.amber{color:#633806;}.sv.red{color:#A32D2D;}
.toast{display:inline-block;margin-left:12px;background:#e1f5ee;color:#085041;border:0.5px solid #9FE1CB;padding:4px 10px;border-radius:var(--border-radius-md);font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.err{background:#FCEBEB;color:#A32D2D;border-color:#F7C1C1;}
.toast.show{opacity:1;}
</style>

<h2 class="sr-only">CRA — Compte Rendu d'Activité</h2>
<div class="cra">

  <div class="top-bar">
    <i class="ti ti-user" aria-hidden="true" style="font-size:15px;color:var(--color-text-secondary);"></i>
    <input class="collab-input" type="text" id="collabName" placeholder="Nom du collaborateur..." oninput="updateSummary()" />
    <div class="divider"></div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="monthLabel"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="toolbar-left">
      <input class="act-input" type="text" id="newAct" placeholder="Nouvelle activité / projet..." onkeydown="if(event.key==='Enter')addActivity()" />
      <button class="btn" onclick="addActivity()"><i class="ti ti-plus" aria-hidden="true"></i> Ajouter</button>
      <span class="toast" id="toast"></span>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-blue" onclick="document.getElementById('fileIn').click()"><i class="ti ti-upload" aria-hidden="true"></i> Importer</button>
      <input type="file" id="fileIn" accept=".xlsx,.xls" style="display:none;" onchange="importExcel(event)" />
      <button class="btn btn-green" onclick="exportExcel()"><i class="ti ti-download" aria-hidden="true"></i> Exporter</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead id="tHead"></thead>
      <tbody id="tBody"></tbody>
    </table>
  </div>
  <div class="summary" id="summary"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS=['dim','lun','mar','mer','jeu','ven','sam'];
let year=new Date().getFullYear(), month=new Date().getMonth();
let activities=[];
let data={};

function k(row,col){return `${year}|${month}|${row}|${col}`;}
function daysInM(y,m){return new Date(y,m+1,0).getDate();}
function isWE(d){const w=new Date(year,month,d).getDay();return w===0||w===6;}
function get(row,col){return data[k(row,col)]||'';}
function set(row,col,val){const ky=k(row,col);if(val==='')delete data[ky];else data[ky]=val;updateSummary();}

function vCls(v,type){
  if(type==='act'){return v==='1'?'v1':v==='0.5'?'vh':'';}
  if(type==='conge'){return(v==='1'||v==='0.5')?'vc':'';}
  if(type==='rtt'){return(v==='1'||v==='0.5')?'vr':'';}
  return '';
}

function toast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(err?' err':'')+' show';
  setTimeout(()=>t.classList.remove('show'),2200);
}

function changeMonth(d){month+=d;if(month>11){month=0;year++;}if(month<0){month=11;year--;}render();}

function addActivity(){
  const inp=document.getElementById('newAct');
  const v=inp.value.trim();
  if(!v){toast('Saisissez un nom d\'activité',true);return;}
  if(activities.includes(v)){toast('Activité déjà existante',true);return;}
  activities.push(v);render();inp.value='';toast('Activité ajoutée');
}

function removeActivity(i){
  const name=activities[i];
  activities.splice(i,1);
  const days=daysInM(year,month);
  for(let d=1;d<=days;d++) delete data[k(i,d)];
  activities.forEach((_,ni)=>{
    if(ni>=i){
      for(let d=1;d<=days;d++){
        const oldKey=k(ni+1,d), newKey=k(ni,d);
        if(data[oldKey]!==undefined){data[newKey]=data[oldKey];delete data[oldKey];}
        else delete data[newKey];
      }
    }
  });
  render();toast(`"${name}" supprimée`);
}

function makeSelect(rowKey,d,type){
  const v=get(rowKey,d);
  const c=vCls(v,type);
  return `<select class="cs ${c}" onchange="set('${rowKey}',${d},this.value);updateCellCls(this,'${type}')">`
    +`<option value="">—</option>`
    +`<option value="1"${v==='1'?' selected':''}>1</option>`
    +`<option value="0.5"${v==='0.5'?' selected':''}>0.5</option>`
    +`</select>`;
}

function updateCellCls(sel,type){
  sel.className='cs '+vCls(sel.value,type);
}

function render(){
  document.getElementById('monthLabel').textContent=`${MONTHS[month]} ${year}`;
  const days=daysInM(year,month);

  let h=`<tr><th class="act-col">Activité / Jour</th>`;
  for(let d=1;d<=days;d++){
    const we=isWE(d);
    h+=`<th class="${we?'we-th':''}"><div class="dh"><span class="dn">${DAYS[new Date(year,month,d).getDay()]}</span><span class="dd">${d}</span></div></th>`;
  }
  h+=`<th style="min-width:44px;padding:0 4px;">Tot.</th></tr>`;
  document.getElementById('tHead').innerHTML=h;

  let b='';
  activities.forEach((act,i)=>{
    b+=`<tr><td class="act-col"><div class="lbl-row"><span class="lbl-text" title="${act}">${act}</span>`
      +`<button class="del-btn" onclick="removeActivity(${i})" title="Supprimer cette activité"><i class="ti ti-trash" aria-hidden="true" style="font-size:11px;"></i> Suppr.</button>`
      +`</div></td>`;
    let tot=0;
    for(let d=1;d<=days;d++){
      const we=isWE(d);const v=get(i,d);
      if(v==='1')tot+=1;else if(v==='0.5')tot+=0.5;
      b+=`<td class="dc${we?' we':''}">${we?'<span style="color:var(--color-text-tertiary);font-size:10px;">·</span>':makeSelect(i,d,'act')}</td>`;
    }
    b+=`<td class="tc">${tot||''}</td></tr>`;
  });

  if(activities.length===0){
    b+=`<tr><td class="act-col" colspan="${days+2}" style="color:var(--color-text-tertiary);font-size:12px;padding:12px 10px;">Aucune activité — ajoutez-en une ci-dessus</td></tr>`;
  }

  b+=`<tr class="sep-row"><td class="act-col" colspan="${days+2}"></td></tr>`;

  const special=[
    {key:'conge',label:'<i class="ti ti-beach" aria-hidden="true" style="font-size:12px;margin-right:4px;vertical-align:-1px;"></i>Congés payés',cls:'lbl-conge',type:'conge',tcls:'ok'},
    {key:'rtt',label:'<i class="ti ti-sun" aria-hidden="true" style="font-size:12px;margin-right:4px;vertical-align:-1px;"></i>RTT',cls:'lbl-rtt',type:'rtt',tcls:'blu'}
  ];
  special.forEach(({key,label,cls,type,tcls})=>{
    b+=`<tr><td class="act-col ${cls}">${label}</td>`;
    let tot=0;
    for(let d=1;d<=days;d++){
      const we=isWE(d);const v=get(key,d);
      if(v==='1')tot+=1;else if(v==='0.5')tot+=0.5;
      b+=`<td class="dc${we?' we':''}">${we?'<span style="color:var(--color-text-tertiary);font-size:10px;">·</span>':makeSelect(key,d,type)}</td>`;
    }
    b+=`<td class="tc ${tot?tcls:''}">${tot||''}</td></tr>`;
  });

  b+=`<tr class="tot-row"><td class="act-col">Total / jour</td>`;
  let grand=0;
  for(let d=1;d<=days;d++){
    if(isWE(d)){b+=`<td class="dc we"></td>`;continue;}
    let s=0;
    activities.forEach((_,i)=>{const v=get(i,d);if(v==='1')s+=1;else if(v==='0.5')s+=0.5;});
    ['conge','rtt'].forEach(r=>{const v=get(r,d);if(v==='1')s+=1;else if(v==='0.5')s+=0.5;});
    grand+=s;
    b+=`<td class="dc tc ${s>1?'over':s===1?'ok':''}">${s||''}</td>`;
  }
  b+=`<td class="tc">${grand||''}</td></tr>`;
  document.getElementById('tBody').innerHTML=b;
  updateSummary();
}

function updateSummary(){
  const days=daysInM(year,month);
  let worked=0,conge=0,rtt=0,ouvres=0;
  for(let d=1;d<=days;d++){
    if(!isWE(d))ouvres++;
    const c=get('conge',d);if(c==='1')conge+=1;else if(c==='0.5')conge+=0.5;
    const r=get('rtt',d);if(r==='1')rtt+=1;else if(r==='0.5')rtt+=0.5;
    let s=0;activities.forEach((_,i)=>{const v=get(i,d);if(v==='1')s+=1;else if(v==='0.5')s+=0.5;});
    worked+=s;
  }
  const total=worked+conge+rtt;
  const diff=total-ouvres;
  const dc=diff>0.05?'red':diff<-0.05?'amber':'green';
  const name=document.getElementById('collabName').value.trim()||'Collaborateur';
  document.getElementById('summary').innerHTML=`
    <div class="sc"><div class="sl">Collaborateur</div><div class="sv" style="font-size:13px;color:var(--color-text-secondary);">${name}</div><div class="sl" style="margin-top:2px;">${MONTHS[month]} ${year}</div></div>
    <div class="sc"><div class="sl">Jours ouvrés</div><div class="sv">${ouvres}</div></div>
    <div class="sc"><div class="sl">Travaillés</div><div class="sv green">${worked}</div></div>
    <div class="sc"><div class="sl">Congés</div><div class="sv green">${conge}</div></div>
    <div class="sc"><div class="sl">RTT</div><div class="sv blue">${rtt}</div></div>
    <div class="sc"><div class="sl">Total imputé</div><div class="sv ${dc}">${total} / ${ouvres}</div></div>
  `;
}

function exportExcel(){
  const days=daysInM(year,month);
  const name=document.getElementById('collabName').value.trim()||'Collaborateur';
  const wb=XLSX.utils.book_new();
  const rows=[];
  rows.push([`CRA — ${name} — ${MONTHS[month]} ${year}`]);
  rows.push([]);
  const hRow=['Activité / Jour'];
  for(let d=1;d<=days;d++) hRow.push(isWE(d)?`(${d})`:`${d}`);
  hRow.push('Total');
  rows.push(hRow);
  activities.forEach((act,i)=>{
    const row=[act];let tot=0;
    for(let d=1;d<=days;d++){const v=get(i,d);const n=v==='1'?1:v==='0.5'?0.5:null;if(n)tot+=n;row.push(n??'');}
    row.push(tot||'');rows.push(row);
  });
  rows.push([]);
  ['conge','rtt'].forEach(type=>{
    const row=[type==='conge'?'Congés payés':'RTT'];let tot=0;
    for(let d=1;d<=days;d++){const v=get(type,d);const n=v==='1'?1:v==='0.5'?0.5:null;if(n)tot+=n;row.push(n??'');}
    row.push(tot||'');rows.push(row);
  });
  const tRow=['Total / jour'];let grand=0;
  for(let d=1;d<=days;d++){
    if(isWE(d)){tRow.push('');continue;}
    let s=0;
    activities.forEach((_,i)=>{const v=get(i,d);if(v==='1')s+=1;else if(v==='0.5')s+=0.5;});
    ['conge','rtt'].forEach(r=>{const v=get(r,d);if(v==='1')s+=1;else if(v==='0.5')s+=0.5;});
    grand+=s;tRow.push(s||'');
  }
  tRow.push(grand||'');rows.push(tRow);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:24},...Array(days).fill({wch:5}),{wch:7}];
  XLSX.utils.book_append_sheet(wb,ws,`${MONTHS[month]} ${year}`);
  XLSX.writeFile(wb,`CRA_${name.replace(/\s+/g,'_')}_${MONTHS[month]}_${year}.xlsx`);
  toast('Export réussi !');
}

function importExcel(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(!rows||rows.length<3){toast('Fichier non reconnu',true);return;}
      const title=(rows[0][0]||'').toString();
      const nm=title.match(/CRA\s*—\s*(.+?)\s*—/);
      const mo=title.match(/—\s*([^\s—]+)\s+(\d{4})$/);
      if(nm)document.getElementById('collabName').value=nm[1].trim();
      if(mo){const mi=MONTHS.indexOf(mo[1].trim());if(mi>=0)month=mi;year=parseInt(mo[2])||year;}
      data={};activities=[];
      let hIdx=-1;
      for(let r=0;r<rows.length;r++){if((rows[r][0]||'').toString()==='Activité / Jour'){hIdx=r;break;}}
      if(hIdx<0){toast('Format non reconnu',true);return;}
      const days=daysInM(year,month);
      const colMap={};
      rows[hIdx].forEach((v,c)=>{if(c===0)return;const d=parseInt((v||'').toString().replace(/[()]/g,''));if(d>=1&&d<=days)colMap[c]=d;});
      for(let r=hIdx+1;r<rows.length;r++){
        const row=rows[r];const label=(row[0]||'').toString().trim();
        if(!label)continue;
        let rowKey;
        if(label==='Congés payés')rowKey='conge';
        else if(label==='RTT')rowKey='rtt';
        else if(label==='Total / jour')break;
        else{activities.push(label);rowKey=activities.length-1;}
        Object.entries(colMap).forEach(([c,d])=>{
          const v=row[parseInt(c)];
          if(v===1||v==='1')set(rowKey,d,'1');
          else if(v===0.5||v==='0.5')set(rowKey,d,'0.5');
        });
      }
      render();toast('Import réussi !');
    }catch(err){toast('Erreur lors de l\'import',true);}
    evt.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

render();
</script>
